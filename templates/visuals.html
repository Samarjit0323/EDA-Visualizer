{% extends "layout.html" %}

{% block content %}
<div class="container hero-section d-flex flex-column align-items-center justify-content-center text-center">
    <div class="glass-container">
        <h2 style="font-family: 'Playpen Sans', sans-serif; color: aqua">Visualizations</h2>
        <div class="d-flex justify-content-center gap-3 mb-4 mt-4">
            <a href="{{ url_for('learn_visuals')}}" class="btn" style="
                border: 1px solid rgba(0,255,255,0.6);
                color: aqua;
                border-radius: 30px;
                padding: 10px 22px;
                font-size: 16px;
                background: rgba(255,255,255,0.05);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                display: inline-flex;
                align-items: center;
                gap: 10px;
                transition: all 0.3s ease;
            " onmouseover="
                this.style.background='rgba(0,255,255,0.1)';
                this.style.color='white';
                this.style.transform='translateY(-2px)';
            " onmouseout="
                this.style.background='rgba(255,255,255,0.05)';
                this.style.color='aqua';
                this.style.transform='translateY(0)';
            ">
                <i class="bi bi-info-circle" style="font-size: 18px;"></i>
                Know More
            </a>
            <a href="{{ url_for('download_visual_report', file_id=file_id) }}" class="btn" style="
                border: 1px solid rgba(0,255,255,0.6);
                color: aqua;
                border-radius: 30px;
                padding: 10px 22px;
                font-size: 16px;
                background: rgba(255,255,255,0.05);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                display: inline-flex;
                align-items: center;
                gap: 10px;
                transition: all 0.3s ease;
                margin-left: 10px;
            " onmouseover="
                this.style.background='rgba(0,255,255,0.1)';
                this.style.color='white';
                this.style.transform='translateY(-2px)';
            " onmouseout="
                this.style.background='rgba(255,255,255,0.05)';
                this.style.color='aqua';
                this.style.transform='translateY(0)';
            ">
                <i class="fa-solid fa-cloud-arrow-down" style="font-size: 18px;"></i>
                Download Visuals
            </a>
        </div>

        {% for viz, imgs in plots.items() %}

        <div style="margin-bottom: 40px; text-align: center;">

            <!-- Section Title -->
            <h3 class="hero-subtitle" style="color: whitesmoke; letter-spacing: 1px; margin-bottom: 20px;">
                {{ viz | upper }}
            </h3>

            <!-- Images Grid -->
            <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">

                {% for img in imgs %}
                <div style="
                    background:gold;
                    border-radius: 12px;
                    padding: 10px;
                    backdrop-filter: blur(8px);
                    border: 1px solid rgba(255,255,255,0.1);
                ">
                    <img src="data:image/jpeg;base64,{{ img }}" alt="{{ viz }}" loading="lazy" style="
                            max-width: 350px;
                            width: 100%;
                            border-radius: 10px;
                            display: block;
                        ">
                </div>
                {% endfor %}

            </div>

        </div>

        {% endfor %}
        <a href="{{ url_for('action', file_id=file_id) }}" class="btn btn-outline-light no-hover-btn mt-3" style="border-radius: 30px; font-size: 20px; padding: 10px 20px;">Back</a>
    </div>
</div>

<script>
    document.addEventListener('contextmenu', (e) => {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
        }
    });
</script>
{% endblock%}
