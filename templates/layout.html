<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% if title %} 
            {{title}}
        {% else %}
            EDA Visualizer
        {%endif%}
    </title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playpen+Sans:wght@100..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar fixed-top">
        <div class="container justify-content-center">
            <ul class="navbar-nav">
                <li class="nav-item d-flex align-items-center">
                    <i class="bi bi-house-fill me-2 " style="color: white; "></i>
                    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                </li>
                <li class="nav-item d-flex align-items-center" >
                    <i class="bi bi-info-circle me-2" style="color: white; "></i>
                    <a class="nav-link" href="{{ url_for('about')}}">About</a>
                </li>
                <li class="nav-item d-flex align-items-center">
                    <i class="bi bi-box-arrow-in-right me-2" style="color: white; "></i>
                    <a class="nav-link" href="/login">Login</a>
                </li>
                <li class="nav-item d-flex align-items-center">
                    <i class="bi bi-person-plus me-2" style="color: white; "></i>
                    <a class="nav-link" href="/register">Register</a>
                </li>
                <li class="nav-item d-flex align-items-center">
                    <i class="bi bi-envelope me-2" style="color: white; "></i>
                    <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
                </li>
                <li class="nav-item dropdown d-flex align-items-center">
                    <a class="nav-link dropdown-toggle" href="#" id="learnDropdown" role="button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        <i class="bi bi-mortarboard-fill me-2"></i>
                        Learn
                    </a>
                    <div class="dropdown-menu" aria-labelledby="learnDropdown">
                        <a href="{{ url_for('learn_stats') }}" class="dropdown-item hover-underline m-2">  Statistical Analysis </a>
                        <a href="" class="dropdown-item hover-underline m-2">  Exploratory Data Analysis (EDA)</a>
                        <a href="" class="dropdown-item hover-underline m-2">  Visualizations </a>
                    </div>
                </li>
            </ul>
        </div>
    </nav>   
    {% block content %}
    {% endblock %}
    <footer class="mini-footer fixed-bottom">
        <div class="footer-inner">
            <span>© 2026 EDA Visualizer</span>
            <a href="https://github.com/Samarjit0323" target="_blank">
                <i class="bi bi-github me-2" style="color: aqua; "></i>
            </a>
        </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', path='js/main.js') }}"></script>
</body>
</html>
